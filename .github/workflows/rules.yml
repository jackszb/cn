name: Build Rules

on:
workflow_dispatch:

jobs:
build:
runs-on: ubuntu-latest
steps:
- uses: actions/checkout@v4

```
  - name: Install
    run: |
      curl -fsSL https://sing-box.app/install.sh | sh
      echo "$HOME/.local/bin" >> $GITHUB_PATH

  - name: Download
    run: |
      curl -L https://static-file-global.353355.xyz/rules/cn-additional-list.txt -o list.txt

  - name: Clean
    run: |
      cat list.txt | sed 's/^[ \t]*//;s/[ \t]*$//' | grep -v '^#' | grep -v '^$' | sort -u > clean.txt

  - name: JSON
    run: |
      echo '{"version":4,"rules":[{"domain_suffix":[' > cn.json
      sed 's/^/"/;s/$/",/' clean.txt >> cn.json
      sed -i '$ s/,$//' cn.json
      echo ']}]}' >> cn.json

  - name: SRS
    run: |
      sing-box rule-set compile cn.json -o cn.srs

  - name: Push
    run: |
      git config user.name "bot"
      git config user.email "bot@users.noreply.github.com"
      git add .
      git commit -m "update" || echo ok
      git push
